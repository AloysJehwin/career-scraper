AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Career Scraper API — Lambda + Function URL

Parameters:
  ApiToken:
    Type: String
    NoEcho: true
    Description: Bearer token for API authentication

Resources:
  CareerApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      MemorySize: 256
      Timeout: 30
      Architectures:
        - x86_64
      Environment:
        Variables:
          JOBS_S3_BUCKET: dashboard-static-assets-708835965056
          API_TOKEN: !Ref ApiToken
      Policies:
        - S3ReadPolicy:
            BucketName: dashboard-static-assets-708835965056
      FunctionUrlConfig:
        AuthType: NONE
    Metadata:
      Dockerfile: Dockerfile.lambda
      DockerContext: .

Outputs:
  CareerApiUrl:
    Description: Function URL for the Career API
    Value: !GetAtt CareerApiFunctionUrl.FunctionUrl
