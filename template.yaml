AWSTemplateFormatVersion: "2010-09-09"
Description: Career Scraper API — Lambda + API Gateway with API Key

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI for the Lambda function
  ApiToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Bearer token for API authentication (optional)

Resources:
  # --- Lambda ---
  CareerApiFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadJobs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: arn:aws:s3:::dashboard-static-assets-708835965056/jobs/*

  CareerApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: career-api
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      MemorySize: 256
      Timeout: 30
      Architectures:
        - x86_64
      Role: !GetAtt CareerApiFunctionRole.Arn
      Environment:
        Variables:
          JOBS_S3_BUCKET: dashboard-static-assets-708835965056
          API_TOKEN: !Ref ApiToken

  CareerApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CareerApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CareerApi}/*"

  # --- API Gateway ---
  CareerApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: career-api
      ProtocolType: HTTP

  CareerApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref CareerApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt CareerApiFunction.Arn
      PayloadFormatVersion: "2.0"

  CareerApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref CareerApi
      RouteKey: "$default"
      Target: !Sub "integrations/${CareerApiIntegration}"

  CareerApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref CareerApi
      StageName: "$default"
      AutoDeploy: true

Outputs:
  CareerApiUrl:
    Description: API Gateway URL for the Career API
    Value: !GetAtt CareerApi.ApiEndpoint
