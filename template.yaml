AWSTemplateFormatVersion: "2010-09-09"
Description: Career Scraper API — Lambda + Function URL

Parameters:
  ApiToken:
    Type: String
    NoEcho: true
    Description: Bearer token for API authentication
  ImageUri:
    Type: String
    Description: ECR image URI for the Lambda function

Resources:
  CareerApiFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadJobs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: arn:aws:s3:::dashboard-static-assets-708835965056/jobs/*

  CareerApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: career-api
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      MemorySize: 256
      Timeout: 30
      Architectures:
        - x86_64
      Role: !GetAtt CareerApiFunctionRole.Arn
      Environment:
        Variables:
          JOBS_S3_BUCKET: dashboard-static-assets-708835965056
          API_TOKEN: !Ref ApiToken

  CareerApiFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt CareerApiFunction.Arn

  CareerApiFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CareerApiFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

Outputs:
  CareerApiUrl:
    Description: Function URL for the Career API
    Value: !GetAtt CareerApiFunctionUrl.FunctionUrl
