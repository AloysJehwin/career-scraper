name: Deploy Career API

on:
  push:
    branches: [master]
    paths:
      - "src/career_scraper/api.py"
      - "src/career_scraper/lambda_handler.py"
      - "Dockerfile.lambda"
      - "template.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 708835965056.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: career-api
  STACK_NAME: career-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${{ github.sha }}"
          docker build -f Dockerfile.lambda -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          docker tag "$IMAGE_URI" "${ECR_REGISTRY}/${ECR_REPO}:latest"
          docker push "${ECR_REGISTRY}/${ECR_REPO}:latest"

      - name: Deploy CloudFormation stack
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${{ github.sha }}"
          aws cloudformation deploy \
            --template-file template.yaml \
            --stack-name "$STACK_NAME" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              ApiToken=${{ secrets.CAREER_API_TOKEN }} \
              ImageUri="$IMAGE_URI" \
            --no-fail-on-empty-changeset

      - name: Print Function URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CareerApiUrl'].OutputValue" \
            --output text
